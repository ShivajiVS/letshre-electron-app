name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🔐 Security"
    labels: ["security"]
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug Fixes"
    labels: ["fix", "bugfix", "bug"]
  - title: "⚡ Performance"
    labels: ["performance"]
  - title: "🧹 Maintenance"
    labels: ["chore", "maintenance", "ci", "refactor"]
  - title: "📝 Documentation"
    labels: ["documentation", "docs"]

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "fix", "bugfix", "bug", "security", "chore", "maintenance"]
  default: patch

template: |
  ## What's Changed

  $CHANGES

  ---

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
