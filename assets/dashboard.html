<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — LetsHyre Secure Interview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>

    <header class="topbar">
      <div class="topbar__brand">
        <img src="./logo.png" alt="LetsHyre" />
      </div>

      <div class="topbar__right">
        <div class="topbar__user">
          <div class="topbar__avatar" id="avatar">
            <span id="avatar-initials">–</span>
          </div>
          <div class="topbar__user-info">
            <div class="topbar__name" id="user-name">…</div>
            <div class="topbar__role" id="user-role"></div>
          </div>
        </div>

        <div class="topbar__divider"></div>

        <button class="btn-ghost" id="logout-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log out
        </button>
      </div>
    </header>

    <main class="dash-main">

      <!-- Profile card -->
      <div class="profile-card" id="profile-card">
        <div class="profile-card__avatar" id="profile-avatar">
          <span id="profile-initials">–</span>
        </div>
        <div class="profile-card__info">
          <p class="profile-card__name" id="profile-name">
            <span class="skeleton" style="width:180px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
          </p>
          <p class="profile-card__role" id="profile-role">
            <span class="skeleton" style="width:110px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
          </p>
          <div class="profile-card__meta" id="profile-meta">
            <span class="skeleton" style="width:160px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
          </div>
        </div>
      </div>

      <!-- Interview card -->
      <div class="dash-card">
        <h1 class="dash-card__title" id="welcome">Welcome</h1>
        <p class="dash-card__text">
          When you're ready, start your interview. We'll run a quick security
          check first to make sure your environment is set up correctly.
        </p>

        <!-- Attempt tracker — hidden until profile loads -->
        <div class="attempt-tracker" id="attempt-tracker" style="display:none">
          <span class="attempt-tracker__label">Attempts used</span>
          <div class="attempt-tracker__dots" id="attempt-dots"></div>
          <span class="attempt-tracker__count" id="attempt-count"></span>
        </div>

        <button class="btn-cta" id="take-interview-btn" type="button">
          Take interview
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>
        <p class="dash-note" id="dash-note">A security check runs before the interview begins.</p>
      </div>

    </main>

    <script src="../src/renderer/dashboard.js"></script>
  </body>
</html>
