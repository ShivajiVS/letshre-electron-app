name: Build & Release

on:
  push:
    tags:
      - "v*" # trigger on version tags, e.g. v1.2.0
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  # ──────────────────────────────────────────────────────────────
  # 0. Lint & Format check (fast gate — runs before any builds)
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Node dependencies
        run: npm ci

      # Hard gate — security-critical unit tests (detection, kill whitelist,
      # blocklist) must pass before any build/publish.
      - name: Run tests
        run: npm test

      # Non-blocking for now (the repo has pre-existing lint debt). Once that is
      # cleared, drop `continue-on-error` to make this a hard release gate.
      # - name: Run ESLint
      #   run: npm run lint
      #   continue-on-error: true

      # - name: Check Prettier formatting
      #   run: npm run format:check
      #   continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # 1. Build agent.exe on Windows
  # ──────────────────────────────────────────────────────────────
  build-agent-windows:
    name: Build agent.exe (Windows)
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-pyinstaller-psutil
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install pyinstaller psutil

      - name: Build agent.exe
        run: python scripts/build_agent.py

      - name: Upload agent.exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-windows
          path: resources/agent.exe

  # ──────────────────────────────────────────────────────────────
  # 2. Build agent (Unix binary) on macOS
  # ──────────────────────────────────────────────────────────────
  # build-agent-macos:
