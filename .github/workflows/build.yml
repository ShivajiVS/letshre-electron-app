    #       key: ${{ runner.os }}-pip-pyinstaller-psutil
    #       restore-keys: ${{ runner.os }}-pip-

    #   - name: Install dependencies
    #     run: pip install pyinstaller psutil

    #   - name: Build agent binary
    #     run: python scripts/build_agent.py

    #   - name: Upload agent as artifact
    #     uses: actions/upload-artifact@v4
    #     with:
    #       name: agent-macos
    #       path: resources/agent

  # ──────────────────────────────────────────────────────────────
  # 3. Package Electron app for Windows (needs agent.exe)
  # ──────────────────────────────────────────────────────────────
  build-electron-windows:
    name: Package Electron (Windows)
    runs-on: windows-latest
    needs: build-agent-windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Node dependencies
        run: npm ci

      - name: Download agent.exe
        uses: actions/download-artifact@v4
        with:
          name: agent-windows
          path: resources/

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Package (Windows)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Read signing secrets into NEUTRAL names electron-builder does NOT
          # recognise (it natively reads CSC_LINK / WIN_CSC_LINK / *_KEY_PASSWORD).
          # A missing secret is injected as an EMPTY STRING, and electron-builder
          # treats an empty CSC_LINK as "sign, but the cert path is invalid" — the
          # "not a file" failure. We promote to the real names only when non-empty,
          # so this builds UNSIGNED with no cert and signs automatically once the
          # WIN_CSC_LINK secret is added — no further code changes required.
          SIGN_PFX: ${{ secrets.WIN_CSC_LINK }}
          SIGN_PFX_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ($env:SIGN_PFX) {
            $env:CSC_LINK = $env:SIGN_PFX
            $env:CSC_KEY_PASSWORD = $env:SIGN_PFX_PASSWORD
            Write-Host "Code signing ENABLED."
          } else {
            Write-Host "No signing certificate — building UNSIGNED."
          }
          npx electron-builder --win --publish always

